name: Windows beta

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  build-and-package:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore JavaScript dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Typecheck
        run: npm run typecheck

      - name: Run renderer and main-process tests
        run: npm test

      - name: Build and test Windows helper
        run: npm run test:helper

      - name: Publish self-contained Windows helper
        run: npm run helper:build

      - name: Run two-cycle helper-process smoke with deterministic test audio
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/audio | Out-Null
          npm run --silent test:helper-process-smoke | Out-File artifacts/audio/helper-smoke-report.json -Encoding utf8
          $report = Get-Content artifacts/audio/helper-smoke-report.json -Raw | ConvertFrom-Json
          if ($report.captureBackend -ne 'synthetic-test' -or $report.wasapiCaptureValidated -ne $false -or $report.captureCycles -ne 2) {
            throw 'The deterministic two-cycle helper-process smoke did not report its backend and coverage accurately.'
          }

      - name: Record code-integrity environment
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/code-integrity | Out-Null
          npm run --silent test:code-integrity-environment | Out-File artifacts/code-integrity/environment.json -Encoding utf8
          $report = Get-Content artifacts/code-integrity/environment.json -Raw | ConvertFrom-Json
          if ($report.spawnOutcome.state -ne 'ready') { throw "The CI helper diagnostic did not reach ready: $($report.spawnOutcome.state)" }

      - name: Ensure redacted code-integrity diagnostics exist
        if: always()
        shell: pwsh
        run: |
          $path = 'artifacts/code-integrity/environment.json'
          New-Item -ItemType Directory -Force -Path (Split-Path $path) | Out-Null
          $valid = $false
          if (Test-Path -LiteralPath $path -PathType Leaf) {
            try { $null = Get-Content -LiteralPath $path -Raw | ConvertFrom-Json -ErrorAction Stop; $valid = $true } catch { $valid = $false }
          }
          if (-not $valid) {
            [ordered]@{
              platform = 'win32'
              smartAppControl = 'unknown'
              expectedHelperPath = 'unavailable'
              helperSignature = 'unknown'
              spawnOutcome = [ordered]@{ state = 'diagnostic-failed' }
            } | ConvertTo-Json -Depth 4 | Set-Content -LiteralPath $path -Encoding utf8
          }

      - name: Upload code-integrity diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: PresenterAI-code-integrity-${{ github.run_id }}
          path: artifacts/code-integrity/environment.json
          if-no-files-found: error

      - name: Build Electron application
        run: npm run build

      - name: Run Electron overlay smoke tests
        run: npx playwright test

      - name: Evaluate Milestone 4 retrieval offline
        run: npm run eval:m4

      - name: Validate Milestone 6 live-campaign budget offline
        run: npm run eval:m6:preflight

      - name: Evaluate Milestone 7 grounding offline
        run: npm run eval:m7

      - name: Create unsigned NSIS installer
        run: npx electron-builder --win nsis --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Resolve exact current installer artifact
        id: current-installer
        shell: pwsh
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          if ($version -notmatch '^[0-9A-Za-z][0-9A-Za-z.+-]*$') { throw 'package.json contains an unsafe version.' }
          $filename = "PresenterAI-$version-setup.exe"
          $path = "release/$filename"
          if (-not (Test-Path -LiteralPath $path -PathType Leaf)) { throw "The exact current installer was not found: $path" }
          "filename=$filename" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "path=$path" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Generate installer checksum manifest
        run: npm run checksum:installer

      - name: Verify packaged Electron SQLite FTS5
        run: npm run test:packaged-fts

      - name: Verify packaged Windows helper health
        run: npm run test:packaged-helper

      - name: Locate previous successful main installer
        id: previous-main
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $runs = gh run list --repo "${{ github.repository }}" --workflow windows-beta.yml --branch main --status success --limit 20 --json databaseId,headSha,createdAt | ConvertFrom-Json
          $baseline = $runs | Where-Object {
            $_.databaseId -ne [long]"${{ github.run_id }}" -and $_.headSha -ne "${{ github.sha }}"
          } | Sort-Object createdAt -Descending | Select-Object -First 1
          if (-not $baseline) { throw 'A previous successful main Windows-beta installer from a different commit/run is required for the upgrade smoke test.' }
          "run_id=$($baseline.databaseId)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "head_sha=$($baseline.headSha)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Download previous successful main installer
        uses: actions/download-artifact@v5
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.previous-main.outputs.run_id }}
          name: PresenterAI-Windows-beta
          path: artifacts/previous-main

      - name: Verify clean install, upgrade, Delete All, persistence, and uninstall
        shell: pwsh
        run: |
          $current = Get-Item -LiteralPath '${{ steps.current-installer.outputs.path }}'
          $previousInstallers = @(Get-ChildItem artifacts/previous-main -Filter 'PresenterAI-*-setup.exe' -File -Recurse)
          if ($previousInstallers.Count -ne 1) { throw "Expected exactly one previous PresenterAI installer; found $($previousInstallers.Count)." }
          $previous = $previousInstallers[0]
          npm run test:installer:upgrade -- --current $current.FullName --previous $previous.FullName --previous-run-id '${{ steps.previous-main.outputs.run_id }}' --previous-head-sha '${{ steps.previous-main.outputs.head_sha }}' --report artifacts/installer/installer-lifecycle-report.json

      - name: Ensure redacted installer diagnostics exist
        if: always()
        shell: pwsh
        run: |
          $report = 'artifacts/installer/installer-lifecycle-report.json'
          New-Item -ItemType Directory -Force -Path (Split-Path $report) | Out-Null
          if (-not (Test-Path $report)) {
            [ordered]@{
              schemaVersion = 3
              generatedAt = [DateTimeOffset]::UtcNow.ToString('o')
              ok = $false
              lifecycleReportAvailable = $false
              workflowRunId = '${{ github.run_id }}'
              commitSha = '${{ github.sha }}'
              previousBaseline = [ordered]@{
                workflowRunId = '${{ steps.previous-main.outputs.run_id }}'
                headSha = '${{ steps.previous-main.outputs.head_sha }}'
              }
            } | ConvertTo-Json | Set-Content -Path $report -Encoding utf8
          }

      - name: Upload redacted installer diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: PresenterAI-installer-diagnostics-${{ github.run_id }}
          path: artifacts/installer/installer-lifecycle-report.json
          if-no-files-found: error

      - name: Upload Windows installer and validation reports
        uses: actions/upload-artifact@v4
        with:
          name: PresenterAI-Windows-beta
          path: |
            ${{ steps.current-installer.outputs.path }}
            release/SHA256SUMS.txt
            artifacts/m4/m4-retrieval-report.json
            artifacts/m7/m7-offline-report.json
            artifacts/installer/installer-lifecycle-report.json
            artifacts/code-integrity/environment.json
            artifacts/audio/helper-smoke-report.json
            docs/validation/milestones-0-2.md
            docs/validation/milestone-5.md
            docs/validation/milestone-6.md
            docs/validation/milestone-7.md
            docs/validation/milestone-8.md
            docs/validation/plan-alignment.md
            docs/validation/code-first-liquid-glass.md
            docs/validation/clear-glass-compact-copilot.md
          if-no-files-found: error
